<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloth Texture Generator</title>
    <link rel="icon" href="data:," />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: #0a0f18;
        color: #d8e4ff;
        font-family: ui-sans-serif, system-ui, sans-serif;
        padding: 24px;
        padding-right: 380px;
      }

      h1 {
        font-size: 20px;
        margin-bottom: 6px;
      }

      .subtitle {
        opacity: 0.75;
        margin-bottom: 20px;
        max-width: 720px;
        line-height: 1.5;
      }

      #generator-status {
        margin-bottom: 18px;
        font-size: 13px;
        opacity: 0.85;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      .card {
        background: rgb(8 12 20 / 72%);
        border: 1px solid rgb(120 150 220 / 18%);
        border-radius: 10px;
        padding: 12px;
      }

      .card h2 {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      canvas {
        width: 100%;
        aspect-ratio: 1;
        image-rendering: pixelated;
        border-radius: 6px;
        background: #111722;
        display: block;
      }

      button {
        margin-top: 8px;
        width: 100%;
        border: 1px solid rgb(120 150 220 / 28%);
        background: rgb(20 30 50 / 80%);
        color: inherit;
        border-radius: 6px;
        padding: 8px 10px;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
      }

      button:hover {
        background: rgb(30 45 75 / 90%);
      }
    </style>
  </head>
  <body>
    <h1>Cloth Texture Generator</h1>
    <p class="subtitle">
      Offline procedural cloth maps: albedo, tangent-space normal, roughness, and height. Outputs tileable PNGs.
      Use the panel on the right to tweak weave patterns, or run
      <code>npm run generate:cloth</code> from the terminal for batch export.
    </p>
    <p id="generator-status">Generating…</p>

    <div class="grid">
      <div class="card">
        <h2>Albedo</h2>
        <canvas id="preview-albedo"></canvas>
        <button type="button" data-download="albedo">Download PNG</button>
      </div>
      <div class="card">
        <h2>Normal</h2>
        <canvas id="preview-normal"></canvas>
        <button type="button" data-download="normal">Download PNG</button>
      </div>
      <div class="card">
        <h2>Roughness</h2>
        <canvas id="preview-roughness"></canvas>
        <button type="button" data-download="roughness">Download PNG</button>
      </div>
      <div class="card">
        <h2>Height</h2>
        <canvas id="preview-height"></canvas>
        <button type="button" data-download="height">Download PNG</button>
      </div>
    </div>

    <script type="module" src="/src/tools/clothGeneratorApp.ts"></script>
  </body>
</html>
